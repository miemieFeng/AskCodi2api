<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AskCodi Token 池管理</title>
    <link rel="stylesheet" href="/ui/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="sidebar">
        <h2>AskCodi Token池</h2>
        <ul>
            <li><a href="#" class="nav-btn active" onclick="showTab('dashboard', this)">仪表盘</a></li>
            <li><a href="#" class="nav-btn" onclick="showTab('accounts', this)">账号管理</a></li>
            <li><a href="#" class="nav-btn" onclick="showTab('proxies', this)">代理配置</a></li>
            <li><a href="#" class="nav-btn" onclick="showTab('settings', this)">系统设置</a></li>
        </ul>
    </div>
    <div class="main-content">
        <div id="dashboard" class="tab-content active">
            <h1>仪表盘概览</h1>
            <div class="stats-grid">
                <div class="stat-card"><h3>总账号数</h3><p id="stat-total-accounts">0</p></div>
                <div class="stat-card"><h3>活跃账号数</h3><p id="stat-active-accounts">0</p></div>
                <div class="stat-card"><h3>代理节点数</h3><p id="stat-total-proxies">0</p></div>
                <div class="stat-card"><h3>剩余总 Tokens</h3><p id="stat-total-tokens">0</p></div>
            </div>
        </div>

        <div id="accounts" class="tab-content" style="display: none;">
            <h1>账号管理</h1>
            <div class="actions" style="display: flex; align-items: center; flex-wrap: wrap; gap: 10px;">
                <button class="primary-btn" onclick="triggerRegister()">注册批量账号</button>
                <button class="primary-btn" onclick="refreshAllTokens()" style="background-color: #ff9800;">批量刷新余额</button>
                <span style="margin-left: auto; display: flex; gap: 5px;">
                    <button class="filter-btn active" onclick="filterByStatus('')">全部</button>
                    <button class="filter-btn" onclick="filterByStatus('Active')">正常</button>
                    <button class="filter-btn" onclick="filterByStatus('Exhausted')">已耗尽</button>
                    <button class="filter-btn" onclick="filterByStatus('Banned')">被封禁</button>
                </span>
            </div>
            <table id="accounts-table">
                <thead><tr><th>ID</th><th>邮箱</th><th>状态</th><th>剩余 Tokens</th><th>操作</th></tr></thead>
                <tbody></tbody>
            </table>
            <div id="pagination" style="display: flex; align-items: center; justify-content: center; gap: 5px; margin-top: 15px; padding: 10px 0;"></div>

            <div style="margin-top: 30px;">
                <h3>后台注册实时日志 (Live Logs)</h3>
                <div id="registration-logs" style="background: #1e1e1e; color: #4af626; padding: 15px; height: 300px; overflow-y: auto; font-family: 'Courier New', Courier, monospace; border-radius: 6px; border: 1px solid #333; line-height: 1.5; font-size: 13px;">
                    等待日志载入...
                </div>
            </div>
        </div>

        <div id="proxies" class="tab-content" style="display: none;">
            <h1>代理配置</h1>
            <div class="actions proxy-form">
                <input type="text" id="proxy-url" placeholder="http://127.0.0.1:7890 或 socks5://...">
                <button class="primary-btn" onclick="addProxy()">添加代理</button>
                <button class="primary-btn" style="background: #6c757d;" onclick="refreshZenProxies()">从 ZenProxy 获取代理</button>
            </div>
            <table id="proxies-table">
                <thead><tr><th>ID</th><th>代理地址</th><th>状态</th><th>失败次数</th><th>操作</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <div id="settings" class="tab-content" style="display: none;">
            <h1>系统设置</h1>
            <div class="settings-form" style="max-width: 500px; padding: 20px; background: rgba(0, 0, 0, 0.4); border-radius: 8px;">
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px;">单次触发注册总量 (Batch Size)</label>
                    <input type="number" id="config-batch-size" style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg-color); color: var(--text-main);">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px;">注册最大并发数 (Concurrency)</label>
                    <input type="number" id="config-concurrency" style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg-color); color: var(--text-main);">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px;">后台自动注册检查间隔(分钟)</label>
                    <input type="number" id="config-interval" style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg-color); color: var(--text-main);">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px;">触发自动注册的最低有效账号数</label>
                    <input type="number" id="config-threshold" style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg-color); color: var(--text-main);">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px;">获取邮箱接口 API Key (mail.chatgpt.org.uk)</label>
                    <input type="text" id="config-gptmail-key" placeholder="gpt-test" style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg-color); color: var(--text-main);">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px;">初始推荐码 (第一个账号使用，后续账号链式推荐)</label>
                    <input type="text" id="config-initial-referral-code" placeholder="例如: CA41B77B" style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg-color); color: var(--text-main);">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px;">ZenProxy 地址</label>
                    <input type="text" id="config-zenproxy-url" placeholder="http://cn.azt.cc:13000" style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg-color); color: var(--text-main);">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px;">ZenProxy API Key</label>
                    <input type="text" id="config-zenproxy-api-key" placeholder="your-api-key" style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg-color); color: var(--text-main);">
                </div>
                <div style="margin-bottom: 15px; display: flex; align-items: center; gap: 10px;">
                    <label style="margin: 0;">启用代理</label>
                    <label style="position: relative; display: inline-block; width: 50px; height: 26px; margin: 0;">
                        <input type="checkbox" id="config-proxy-enabled" style="opacity: 0; width: 0; height: 0;">
                        <span style="position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #555; border-radius: 26px; transition: 0.3s;"></span>
                    </label>
                    <span id="proxy-status-text" style="color: var(--text-muted); font-size: 13px;">已关闭</span>
                </div>
                <button class="primary-btn" style="margin-top: 10px;" onclick="saveConfig()">保存配置</button>
            </div>
        </div>
    </div>
    <script src="/ui/app.js"></script>
</body>
</html>
